<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="MAGI">
  <defs>
    <linearGradient id="magig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3a6fa0"/>
      <stop offset="100%" stop-color="#6cafd8"/>
    </linearGradient>
  </defs>
  <!-- Background tile. Rounded square in the same sky-pale
       family as the app's chrome so the logo doesn't read as
       a foreign dark slab in the header strip. -->
  <rect width="32" height="32" rx="7" fill="#d9eaf2"/>
  <!-- The M. Symmetric on x=16. Drawn as a single open
       polyline so it stays a stroke (not a filled region);
       the legs and inner diagonals are 4 segments that
       trace the letter outline:

         (6,6)   ─┐                ┌─ (26,6)
                  \              /
                   \            /
                    \          /
         (6,26) ─    (16,12)     ─ (26,26)

       Apex at (16,12) is high in the middle (the M's
       "valley"). stroke-linejoin=miter keeps the inner
       V crisp at 16px; stroke-linecap=round softens the
       four endpoints so the icon doesn't read as a
       barcode at 22px. -->
  <path d="M6 6 L6 26 L16 12 L26 26 L26 6"
        fill="none"
        stroke="url(#magig)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="miter"/>
</svg>