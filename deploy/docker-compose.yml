# MAGI docker-compose — minimal local deployment.
#
# Single image, one service: Adam.
# Eve containers are not defined here yet — they land in C6 via the
# Adam Web UI dispatch button, which renders per-employee compose files.
#
# Build context is the repo root (``..``) so the Dockerfile at
# ``deploy/Dockerfile`` can ``COPY magi/`` and ``COPY pyproject.toml``.
# This file lives in ``deploy/`` so ``.env`` is auto-loaded by compose
# from the same directory.
#
# All hard-coded values that depend on the deployment (port, host-side
# workspace path, log level) are pulled from .env via ${VAR:-default}
# so the user can override them without editing this file.
#
# C0: Adam only serves /health. SQLite lands at /workspace/state/magi.db
# inside the container. The host-side bind mount is
# ${MAGI_WORKSPACE_DIR}/Adam — Adam owns its own subdirectory under
# the shared MAGI_WORKSPACE_DIR, so EVE containers can sit next to
# it (${MAGI_WORKSPACE_DIR}/eve-<id>:/workspace) once C6 lands.
# Postgres returns in C1.

name: magi

x-magi-base: &magi-base
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  restart: unless-stopped
  environment:
    MAGI_LOG_LEVEL: ${MAGI_LOG_LEVEL:-info}

services:
  adam:
    <<: *magi-base
    environment:
      <<: *magi-base
      MAGI_NODE_ROLE: adam
      MAGI_RELOAD: ${MAGI_RELOAD:-0}
    ports:
      - "${MAGI_PORT:-69420}:69420"
    volumes:
      # Absolute path by default — set MAGI_WORKSPACE_DIR in .env to
      # override. Each container gets its own subdirectory under
      # MAGI_WORKSPACE_DIR.
      - "${MAGI_WORKSPACE_DIR:-/workspace}/Adam:/workspace"