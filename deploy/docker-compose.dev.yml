# MAGI dev-mode compose override.
#
# Usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# The base compose (docker-compose.yml) is the production deployment:
#   - Single image built from `Dockerfile`
#   - magi/WebUI/dist baked in, served by FastAPI on :69420
#
# This override swaps that for the dev image (Dockerfile.dev) which has
# both Python and Node, mounts the source trees as volumes, and runs
# `vite dev` alongside `magi` inside the same container.
#
# Dev workflow:
#   - Open http://localhost:69420/ in browser
#   - Edit magi/*.py   → uvicorn auto-reloads   (MAGI_RELOAD=1)
#   - Edit magi/WebUI/* → vite HMR updates the browser
#   - SQLite at /workspace/state → bind-mount persists to ./workspace/Adam
#
# vite proxies /api/* → 127.0.0.1:8000 (magi, internal). One port (69420)
# is published to the host.

services:
  adam:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dev
    image: magi:dev
    volumes:
      # Source mounts. The image already has the source baked in (so
      # `magi` can run even without these mounts) — the mounts
      # override at runtime so the dev container sees host edits.
      - ./magi:/workspace/magi:ro
      - ./magi/WebUI:/web:ro
    environment:
      MAGI_RELOAD: "1"
      # Backend listens on 8000 INSIDE the container. vite picks it
      # up at http://127.0.0.1:8000 because both run in the same
      # container; no cross-container networking.
      MAGI_PORT: "8000"
      PYTHONPATH: /workspace
      # vite config picks this up when set; if unset it falls back to
      # http://127.0.0.1:${MAGI_PORT}. Either way points at magi.
      VITE_BACKEND_URL: "http://127.0.0.1:8000"
    ports:
      - "69420:69420"