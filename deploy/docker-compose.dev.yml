# MAGI dev-mode compose override.
#
# Usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# The base compose (docker-compose.yml) is the production deployment:
#   - Single image built from `Dockerfile`
#   - magi/WebUI/dist baked in, served by FastAPI on :42069
#
# This override swaps that for the dev image (Dockerfile.dev) which has
# both Python and Node, mounts the source trees as volumes, and runs
# `vite dev` alongside `magi` inside the same container.
#
# Dev workflow (zero build required for source / script edits):
#   - Open http://localhost:42069/ in browser
#   - Edit magi/**/*.py          → uvicorn auto-reloads   (MAGI_RELOAD=1)
#   - Edit magi/WebUI/src/**     → vite HMR updates the browser
#   - Edit deploy/entrypoint.dev.sh → `docker compose restart adam`
#   - SQLite at /workspace/memories → bind-mount persists to ./workspace/Adam
#
# Build the image again ONLY when:
#   - Dockerfile / Dockerfile.dev change (apt deps, ENV baked at build)
#   - pyproject.toml or package.json change (deps installed in build)
#
# vite proxies /api/* → 127.0.0.1:8000 (magi, internal). One port (42069)
# is published to the host.

services:
  adam:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dev
    image: magi:dev
    volumes:
      # Source mounts. The image already has the source baked in (so
      # `magi` can run even without these mounts) — the mounts
      # override at runtime so the dev container sees host edits.
      # The compose file lives in deploy/ so the path is one level up.
      #
      # magi/ is read-only (Python doesn't need to write source).
      # magi/WebUI/ is read-write because vite writes its config cache
      # and HMR state under .vite/ and node_modules/.vite/.
      - ../magi:/workspace/magi:ro
      - ../magi/WebUI:/web
      # Dev entrypoint (start vite + exec magi) lives on the host so
      # we can edit it without rebuilding the image. The image
      # has no entrypoint script — if this mount is missing, the
      # container fails fast on boot (the image's CMD points at
      # /usr/local/bin/entrypoint.sh which won't exist).
      - ./entrypoint.dev.sh:/usr/local/bin/entrypoint.sh:ro
    environment:
      MAGI_RELOAD: "1"
      MAGI_PORT: "8000"
      PYTHONPATH: /workspace
      VITE_BACKEND_URL: "http://127.0.0.1:8000"
    # Override the image's CMD so the bind-mounted dev entrypoint
    # script runs instead of the bare ``magi``. The script starts
    # vite in the background and execs magi as PID 1.
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    ports:
      - "42069:42069"
